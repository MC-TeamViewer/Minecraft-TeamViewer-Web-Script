# Team View Relay Web Script GitHub Actions 配置
name: Team View Relay Web Script CI

on:
  push:
    branches: [ "main", "dev" ]
    paths:
      - ".github/workflows/build.yml"
      - ".gitmodules"
      - "Taskfile.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "buf.gen.yaml"
      - "scripts/**"
      - "src/**"
      - "third_party/TeamViewRelay-Protocol"
  pull_request:
    branches: [ "main", "dev" ]
    paths:
      - ".github/workflows/build.yml"
      - ".gitmodules"
      - "Taskfile.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "buf.gen.yaml"
      - "scripts/**"
      - "src/**"
      - "third_party/TeamViewRelay-Protocol"

jobs:
  build:
    # 使用最新的Ubuntu系统
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # 1. 检出代码仓库
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2. 设置环境
      - name: Set up Buf
        uses: bufbuild/buf-setup-action@v1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      
      - name: Setup Task
        uses: arduino/setup-task@v2

      # 3. 开始编译

      - name: Build versioned artifacts with Task
        shell: bash
        run: task build

      # 4. 上传油猴脚本
      - name: Upload Monkey
        id: upload-monkey
        uses: actions/upload-artifact@v4
        with:
          name: team-view-relay-web-script
          path: build-artifacts/*.js
          if-no-files-found: error
      
